<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AXNews 新闻中心 | Republic of Axie</title>

<style>
body{
    margin:0;
    font-family:"Segoe UI","Microsoft YaHei",sans-serif;
    background:#102a44;
    color:white;
}

header{
    background:#081522;
    text-align:center;
    padding:30px;
}

header h1{
    margin:0;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:30px;
}

.card{
    background:rgba(255,255,255,.05);
    padding:25px;
    margin-bottom:30px;
    border-radius:15px;
}

.card img{
    width:100%;
    max-width:700px;
    border-radius:10px;
    margin:15px 0;
}
    #searchBox{
    width:100%;
    padding:12px;
    margin-bottom:25px;
    border:none;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}

.back{

    display:inline-block;

    margin-top:20px;

    padding:10px 20px;

    background:#2b567f;

    color:white;

    text-decoration:none;

    border-radius:20px;

    transition:.2s;

}

.back:hover{

    background:#3a75b3;

    transform:scale(1.05);

}
</style>

</head>

<body>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCse_UzZJT35j0Uot17BMlXEE-bhM7yOzs",
  authDomain: "axnews.firebaseapp.com",
  projectId: "axnews",
  storageBucket: "axnews.firebasestorage.app",
  messagingSenderId: "83261533390",
  appId: "1:83261533390:web:bf41a618b7ad0d8b4c749f",
  measurementId: "G-DHT9351SM6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadNews() {

    const newsList = document.getElementById("newsList");

    try {

        const q = query(
            collection(db, "news"),
            orderBy("timestamp", "desc")
        );

        const snapshot = await getDocs(q);

        newsList.innerHTML = "";

        let found = 0;

      const keyword = document
    .getElementById("searchBox")
    .value
    .trim()
    .toLowerCase();

snapshot.forEach(doc => {

    const news = doc.data();

    if (
        keyword &&
        !news.title.toLowerCase().includes(keyword) &&
        !news.content.toLowerCase().includes(keyword)
    ) {
        return;
    }
    found++;
            let html = `
            <div class="card">
                <h2>${news.title}</h2>
                <small>${news.date} | ${news.author}</small>
            `;

            if(news.image1){
                html += `<img src="./${news.image1}">`;
            }

            if(news.image2){
                html += `<img src="./${news.image2}">`;
            }

            if(news.image3){
                html += `<img src="./${news.image3}">`;
            }

            html += `
                <p>${news.content}</p>
            </div>
            `;

            newsList.innerHTML += html;

        });
        if (found === 0) {
    newsList.innerHTML = `
        <div class="card">
            <h2>🔍 没有找到相关新闻</h2>
            <p>请尝试其他关键词。</p>
        </div>
    `;
}

    } catch(err) {

        console.error(err);
        newsList.innerHTML = "新闻加载失败";
        
    }

}

document.addEventListener("DOMContentLoaded", () => {
   loadNews();

document.getElementById("searchBox").addEventListener("input", loadNews);
});
</script>
<header>
<h1>📰 AXNews 新闻中心</h1>
<p>Republic of Axie Official News</p>
</header>
<div class="container">

<input
    type="text"
    id="searchBox"
    placeholder="🔍 搜索新闻..."
>

<div id="newsList">
正在加载新闻……
</div>

<a class="back" href="index.html">← 返回首页</a>

</div>
</body>
</html>
